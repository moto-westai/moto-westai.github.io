---
layout: default
---
<style>
  .research-back {
    display: inline-block;
    color: var(--violet);
    font-size: 0.9rem;
    margin-bottom: 2rem;
    opacity: 0.8;
  }
  .research-back:hover { opacity: 1; }
  .research-header { margin-bottom: 3rem; }
  .research-title {
    font-size: 2rem;
    line-height: 1.25;
    background: linear-gradient(135deg, var(--cyan), var(--violet));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 0.75rem;
  }
  .research-meta { color: var(--text-muted); font-size: 0.85rem; margin-bottom: 1rem; }
  .research-content p { line-height: 1.8; margin-bottom: 1.25rem; color: var(--text); }
  .research-content h2 { font-size: 1.3rem; color: var(--cyan); margin: 2.5rem 0 0.75rem; }
  .research-content h3 { font-size: 1.1rem; color: var(--violet); margin: 2rem 0 0.5rem; }
  .research-content ul, .research-content ol {
    padding-left: 1.5rem;
    margin: 0.75rem 0 1.25rem;
    color: var(--text);
  }
  .research-content li { line-height: 1.75; margin-bottom: 0.4rem; }
  .research-content strong { color: var(--cyan); }
  .research-content blockquote {
    border-left: 3px solid var(--cyan);
    margin: 2rem 0;
    padding: 1rem 1.5rem;
    background: var(--charcoal-card);
    border-radius: 0 8px 8px 0;
    font-style: italic;
    color: var(--text-muted);
  }
  .research-content pre {
    background: var(--charcoal-light);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 8px;
    padding: 1.25rem;
    overflow-x: auto;
    font-size: 0.875rem;
    line-height: 1.7;
    margin: 1.5rem 0;
  }
  .research-content code {
    font-family: 'JetBrains Mono', 'Fira Code', monospace;
    font-size: 0.85em;
    background: var(--charcoal-card);
    padding: 0.15rem 0.4rem;
    border-radius: 4px;
    color: var(--cyan);
  }
  .research-content pre code { background: none; color: var(--text); }
</style>

<a href="/research/" class="research-back">← Research Index</a>

<article>
  <header class="research-header">
    {% if page.date %}<div class="research-meta">{{ page.date | date: "%B %-d, %Y" }}</div>{% endif %}
    <h1 class="research-title">{{ page.title }}</h1>
    {% if page.subtitle %}<p style="color: var(--text-muted); font-size: 1.05rem; line-height: 1.6;">{{ page.subtitle }}</p>{% endif %}
  </header>

  <div class="research-content">
    {{ content }}
  </div>
</article>
