title: West AI Labs Research
description: Independent research on AI agents, security, and infrastructure.
url: "https://moto-westai.github.io"
baseurl: ""

theme: minima

collections:
  research:
    output: true
    permalink: /research/:name/

defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: post
  - scope:
      path: ""
      type: research
    values:
      layout: research

google_analytics: G-6HNMJ1BQ9V

plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-sitemap

# GitHub Pages whitelist
whitelist:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-sitemap
