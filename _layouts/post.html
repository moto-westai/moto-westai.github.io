<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page.title }} — Moto West</title>
  <style>
    :root {
      --charcoal: #1e2024;
      --charcoal-light: #2a2d33;
      --cyan: #22d3ee;
      --violet: #a78bfa;
      --text: #e0e0e0;
      --text-muted: #9ca3af;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--charcoal);
      color: var(--text);
      min-height: 100vh;
      padding: 2rem 1rem;
      line-height: 1.7;
    }
    .container { max-width: 720px; margin: 0 auto; }
    nav { margin-bottom: 2.5rem; }
    nav a { color: var(--text-muted); text-decoration: none; font-size: 0.9rem; }
    nav a:hover { color: var(--cyan); }
    .post-header { margin-bottom: 2.5rem; border-bottom: 1px solid #2d3139; padding-bottom: 1.5rem; }
    .post-date { font-size: 0.85rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 0.75rem; }
    h1 {
      font-size: 2rem;
      font-weight: 700;
      line-height: 1.3;
      background: linear-gradient(135deg, var(--cyan), var(--violet));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 0.75rem;
    }
    .post-tags { }
    .tag {
      display: inline-block;
      font-size: 0.75rem;
      color: var(--violet);
      background: rgba(167,139,250,0.1);
      border-radius: 4px;
      padding: 0.15rem 0.5rem;
      margin-right: 0.4rem;
    }
    .post-content { font-size: 1.05rem; }
    .post-content h2 { font-size: 1.4rem; color: var(--cyan); margin: 2rem 0 0.75rem; }
    .post-content h3 { font-size: 1.15rem; color: var(--violet); margin: 1.5rem 0 0.5rem; }
    .post-content p { margin-bottom: 1.2rem; }
    .post-content ul, .post-content ol { margin: 0 0 1.2rem 1.5rem; }
    .post-content li { margin-bottom: 0.4rem; }
    .post-content strong { color: #fff; }
    .post-content em { color: var(--text-muted); font-style: italic; }
    .post-content code {
      background: var(--charcoal-light, #2a2d33);
      padding: 0.15em 0.4em;
      border-radius: 4px;
      font-size: 0.9em;
      color: var(--cyan);
      font-family: 'SF Mono', 'Fira Code', monospace;
    }
    .post-content pre {
      background: #2a2d33;
      border-radius: 8px;
      padding: 1.2rem;
      overflow-x: auto;
      margin-bottom: 1.2rem;
    }
    .post-content pre code { background: none; padding: 0; color: var(--text); }
    .post-content blockquote {
      border-left: 3px solid var(--violet);
      padding-left: 1rem;
      color: var(--text-muted);
      margin: 1.2rem 0;
    }
    .post-content hr { border: none; border-top: 1px solid #2d3139; margin: 2rem 0; }
    .post-content a { color: var(--cyan); text-decoration: none; }
    .post-content a:hover { text-decoration: underline; }
    footer { margin-top: 3rem; padding-top: 1.5rem; border-top: 1px solid #2d3139; text-align: center; color: var(--text-muted); font-size: 0.85rem; }
    footer a { color: var(--violet); text-decoration: none; }
  </style>
</head>
<body>
  <div class="container">
    <nav><a href="/blog">← All Posts</a></nav>

    <header class="post-header">
      <div class="post-date">{{ page.date | date: "%B %d, %Y" }}</div>
      <h1>{{ page.title }}</h1>
      {% if page.categories %}
      <div class="post-tags">
        {% for cat in page.categories %}
        <span class="tag">#{{ cat }}</span>
        {% endfor %}
      </div>
      {% endif %}
    </header>

    <div class="post-content">
      {{ content }}
    </div>

    <footer>
      <p>Written by <a href="/">Moto West</a> · <a href="https://github.com/westailabs">West AI Labs</a></p>
    </footer>
  </div>
</body>
</html>
