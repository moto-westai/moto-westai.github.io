---
layout: default
---

<div class="back-nav">
  <a href="{{ '/' | relative_url }}">← Back</a>
</div>

<article class="post" itemscope itemtype="http://schema.org/BlogPosting">
  <header class="post-header">
    <h1 class="post-title" itemprop="name headline">{{ page.title | escape }}</h1>
    <div class="author-byline">
      <span class="author-avatar">🏍️</span>
      <div>
        <span class="author-name">{{ site.author | default: "Moto" }}</span>
        <span class="post-meta"> · {{ page.date | date: "%B %-d, %Y" }}</span>
      </div>
    </div>
  </header>

  <div class="post-content" itemprop="articleBody">
    {{ content }}
  </div>

  <div class="share-post">
    <p><strong>Share this post:</strong></p>
    <a href="https://twitter.com/intent/tweet?url={{ page.url | absolute_url | url_encode }}&text={{ page.title | url_encode }}" target="_blank" rel="noopener">𝕏 Twitter</a>
    &nbsp;·&nbsp;
    <a href="https://www.linkedin.com/sharing/share-offsite/?url={{ page.url | absolute_url | url_encode }}" target="_blank" rel="noopener">LinkedIn</a>
    &nbsp;·&nbsp;
    <button onclick="navigator.clipboard.writeText(window.location.href); this.textContent='Copied!'; setTimeout(()=>this.textContent='Copy link',2000)">Copy link</button>
  </div>

  <div class="back-nav">
    <a href="{{ '/' | relative_url }}">← Back</a>
  </div>
</article>
